; M5StickS3 FLIP fluid sim — fresh implementation
; Layout: src/fluid (solver), src/render (LovyanGFX), src/imu (BMI270 via M5Unified)

[env:m5sticks3]
platform      = espressif32
board         = m5sticks3
framework     = arduino
lib_deps      =
  m5stack/M5Unified@^0.2.0
  lovyan03/LovyanGFX@^1.1.16
monitor_speed = 115200
build_flags   = -O2 -DCORE_DEBUG_LEVEL=0 -std=gnu++17
build_unflags = -std=gnu++11
