; M5Stack StickS3 Fluid Simulation

[env:m5sticks3]
platform      = espressif32
board         = m5sticks3
framework     = arduino
lib_deps      = m5stack/M5Unified@^0.2.0
monitor_speed = 115200
build_flags   = -O2 -DCORE_DEBUG_LEVEL=0 -std=gnu++17
build_unflags = -std=gnu++11

[env:native]
platform         = native
test_framework   = unity
build_flags      = -std=gnu++17 -Isrc -Itest
; Compile only the host-portable fluid_sim.cpp for tests; exclude main/renderer/input
; which pull in Arduino + M5Unified.
build_src_filter = -<*> +<fluid_sim.cpp>
lib_ldf_mode     = off
lib_deps         = throwtheswitch/Unity@^2.6.1
test_build_src   = true
